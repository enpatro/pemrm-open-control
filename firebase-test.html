<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Firebase Test</title><link rel="stylesheet" href="style.css"></head><body><header><h1>Firebase Connection Test</h1><nav><a href="index.html">KPI Entry</a><a href="dashboard.html">12 Month Dashboard</a><a href="abs-ot-entry.html">Abs & OT Entry</a></nav></header><section class="panel"><button id="testBtn">Run Firebase Read/Write Test</button><p id="msg" class="status">Click test before data entry.</p><h3>Firestore Rule for No Login</h3><pre>rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if true;
    }
  }
}</pre></section><script type="module">import { setStatus, saveDocFB, getDocFB, configOk } from './common.js'; document.getElementById('testBtn').onclick=async()=>{try{if(!configOk){setStatus('FAILED: firebase-config.js still has PASTE values.','bad');return;} await saveDocFB('system_test','connection_test',{month:'Test',message:'Firebase OK',time:new Date().toISOString()}); const d=await getDocFB('system_test','connection_test'); setStatus('PASSED: Firebase read/write working. Other PCs can see data. Read: '+JSON.stringify(d),'ok');}catch(e){setStatus('FAILED: '+(e.code||'')+' - '+e.message,'bad');}};</script></body></html>
